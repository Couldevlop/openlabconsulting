<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" role="img" aria-label="Le marché de l'IA en Afrique passerait de 4,5 milliards de dollars en 2025 à 16,5 milliards en 2030, soit environ 3,7 fois plus (Mastercard / Statista, 2025).">
  <title>Marché de l'IA en Afrique 2025-2030</title>
  <rect width="420" height="300" fill="#faf8f5"/>
  <text x="24" y="34" font-family="Geist, sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">Marché de l'IA en Afrique (milliards $)</text>

  <!-- baseline -->
  <line x1="60" y1="250" x2="396" y2="250" stroke="#e8eaf0" stroke-width="2"/>

  <!-- Bar 2025 -->
  <rect x="110" y="201" width="80" height="49" rx="4" fill="#142654"/>
  <text x="150" y="192" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="20" font-weight="800" fill="#142654">4,5</text>
  <text x="150" y="270" text-anchor="middle" font-family="Geist, sans-serif" font-size="13" fill="#1a1d24">2025</text>

  <!-- Bar 2030 -->
  <rect x="266" y="70" width="80" height="180" rx="4" fill="#ff5a00"/>
  <text x="306" y="61" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="22" font-weight="800" fill="#cc4800">16,5</text>
  <text x="306" y="270" text-anchor="middle" font-family="Geist, sans-serif" font-size="13" fill="#1a1d24">2030</text>

  <!-- growth annotation -->
  <text x="228" y="120" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="18" font-weight="800" fill="#cc4800">× 3,7</text>

  <text x="24" y="290" font-family="Geist, sans-serif" font-size="11" fill="#1a1d24" opacity="0.65">Source : Mastercard / Statista, 2025 (TCAC ≈ 27 %).</text>
</svg>
