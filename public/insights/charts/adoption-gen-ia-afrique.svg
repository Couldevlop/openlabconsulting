<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" role="img" aria-label="Plus de 40 % des organisations africaines expérimentent ou déploient déjà l'IA générative (McKinsey, 2025).">
  <title>Adoption de l'IA générative en Afrique</title>
  <rect width="360" height="300" fill="#faf8f5"/>
  <text x="24" y="36" font-family="Geist, sans-serif" font-size="16" font-weight="700" fill="#0a0e1a">Adoption de l'IA générative en Afrique</text>

  <!-- Donut -->
  <g transform="translate(110 165)">
    <circle r="78" fill="none" stroke="#e8eaf0" stroke-width="34"/>
    <circle r="78" fill="none" stroke="#ff5a00" stroke-width="34"
            stroke-dasharray="196.0 294.1" stroke-dashoffset="0"
            transform="rotate(-90)" stroke-linecap="butt"/>
    <text x="0" y="-4" text-anchor="middle" font-family="'Bricolage Grotesque', sans-serif" font-size="40" font-weight="800" fill="#cc4800">40%+</text>
    <text x="0" y="20" text-anchor="middle" font-family="Geist, sans-serif" font-size="12" fill="#1a1d24">déjà engagées</text>
  </g>

  <!-- Legend -->
  <g font-family="Geist, sans-serif" font-size="13" fill="#1a1d24">
    <rect x="232" y="120" width="14" height="14" rx="3" fill="#ff5a00"/>
    <text x="254" y="132">Expérimentent ou</text>
    <text x="254" y="149">déploient la gen IA</text>
    <rect x="232" y="168" width="14" height="14" rx="3" fill="#e8eaf0"/>
    <text x="254" y="180">Pas encore</text>
    <text x="254" y="197">engagées</text>
  </g>

  <text x="24" y="284" font-family="Geist, sans-serif" font-size="11" fill="#1a1d24" opacity="0.65">Source : McKinsey, « Leading, not lagging: Africa's gen AI opportunity », 2025.</text>
</svg>
