# Quality gates additionnels — CLAUDE.md §17.
#
# Tourne en parallèle de ci.yml (qui fait format/lint/typecheck/test/build).
# Ici on couvre :
#   1. E2E Playwright + axe-core (a11y WCAG 2 AA)
#   2. Lighthouse CI (Performance ≥ 95, A11y ≥ 95, BP ≥ 95, SEO ≥ 100)
#
# Déclenche sur :
#   - PRs vers develop et main
#   - Push sur develop (smoke quotidien implicite)
name: quality

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]
  workflow_dispatch:

# Évite 2 runs Playwright + Lighthouse simultanées sur la même branche
# si plusieurs push s'enchaînent (Playwright = 30 min, Lighthouse = 5 min).
# `head_ref || ref` unifie la clé entre push et pull_request d'une même
# branche source.
concurrency:
  group: quality-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Opt-in Node 24 pour les actions JS (forcé par GitHub à partir du
  # 2 juin 2026). Fait taire le warning de dépréciation Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    name: E2E Playwright + axe-core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # Version pnpm lue depuis package.json `packageManager` — ne PAS
      # spécifier `version:` ici (conflit avec packageManager → ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        # chromium couvre les projets « chromium » et « mobile-chrome » ;
        # « webkit » nécessite son propre binaire (sinon : Executable doesn't exist).
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Build Next.js (standalone)
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: pnpm build
      - name: Run Playwright + axe-core
        run: pnpm test:e2e
        env:
          # Démarrage du dev server intégré (cf. playwright.config.ts).
          NEXT_TELEMETRY_DISABLED: '1'
          # Clé de test Cloudflare « always passes » → /api/contact valide le
          # chemin nominal (202) en CI sans vrai widget. Court-circuitée côté
          # serveur (lib/turnstile.ts), sans appel réseau. Jamais une vraie clé.
          TURNSTILE_SECRET_KEY: '1x0000000000000000000000000000000AA'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI (Perf ≥ 95)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: e2e
    steps:
      - uses: actions/checkout@v4
      # Idem job e2e : pas de `version:`, lecture via packageManager.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Next.js
        run: pnpm build
      # Sert le build STANDALONE (le vrai artefact de prod, identique à
      # l'image Docker). `next start` est incompatible avec
      # `output: standalone` (Next l'avertit) et sert une app dégradée où
      # les balises de l'API Metadata ne sont pas émises → Lighthouse
      # voyait `meta-description` absente (SEO 0.92). Le serveur standalone,
      # lui, rend exactement comme la prod.
      - name: Start Next.js production server (standalone)
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          node .next/standalone/server.js &
        env:
          PORT: '3000'
          HOSTNAME: '0.0.0.0'
          NODE_ENV: 'production'
          # Secrets factices : payload.config (fail-fast prod) doit pouvoir se
          # charger ; la DB est injoignable → les pages rendent via fallback.
          PAYLOAD_SECRET: 'ci-lighthouse-dummy-secret'
          DATABASE_URL: 'postgresql://ci:ci@127.0.0.1:1/none'
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Server up"
              break
            fi
            sleep 2
          done
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/solutions
            http://localhost:3000/livre
            http://localhost:3000/expertises
          configPath: '.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
