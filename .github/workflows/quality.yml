# Quality gates additionnels — CLAUDE.md §17.
#
# Tourne en parallèle de ci.yml (qui fait format/lint/typecheck/test/build).
# Ici on couvre :
#   1. E2E Playwright + axe-core (a11y WCAG 2 AA)
#   2. Lighthouse CI (Performance ≥ 95, A11y ≥ 95, BP ≥ 95, SEO ≥ 100)
#
# Déclenche sur :
#   - PRs vers develop et main
#   - Push sur develop (smoke quotidien implicite)
name: quality

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt-in Node 24 pour les actions JS (forcé par GitHub à partir du
  # 2 juin 2026). Fait taire le warning de dépréciation Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    name: E2E Playwright + axe-core
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build Next.js (standalone)
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        run: pnpm build
      - name: Run Playwright + axe-core
        run: pnpm test:e2e
        env:
          # Démarrage du dev server intégré (cf. playwright.config.ts).
          NEXT_TELEMETRY_DISABLED: '1'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI (Perf ≥ 95)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Next.js
        run: pnpm build
      - name: Start Next.js production server
        run: pnpm start &
        env:
          PORT: '3000'
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "Server up"
              break
            fi
            sleep 2
          done
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000/
            http://localhost:3000/solutions
            http://localhost:3000/livre
            http://localhost:3000/expertises
          configPath: '.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
