# Release workflow — build + push image GHCR + signature Cosign.
#
# Déclenché sur tag `v*` (ex. v1.0.0, v1.2.3-rc.1). Permet à
# `deploy/scripts/deploy.sh production v1.0.0` de pull l'image depuis
# GHCR. Cf. CLAUDE.md §14.7 et docs/migration-lws-hetzner.md §6.
#
# Reuse du pipeline de build CI (Chainguard distroless final, multi-arch
# amd64 suffisant pour K3s Hetzner). Différences vs ci.yml :
#   - `push: true` au lieu de `load: true`
#   - Tags multiples (semver, sha) générés par docker/metadata-action
#   - Signature Cosign keyless (OIDC GitHub → Sigstore Rekor public log)
#
# Permissions OIDC requises pour Cosign keyless : `id-token: write`.
# Permission GHCR push : `packages: write`.
name: release

on:
  push:
    tags:
      - 'v*'
  # Permet aussi un dispatch manuel sur la dernière commit develop pour
  # publier une image de pré-release sans créer de tag (rare).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag à publier (ex: v1.0.0-rc.1). Si vide, prend l'image sha-<short>."
        required: false
        default: ''

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # `github.repository_owner` est `Couldevlop` en User account. Si on
  # crée une org `openlab-consulting` plus tard, mettre à jour `deploy/
  # scripts/deploy.sh` (IMAGE_REPO) ET ce nom d'image en conséquence.
  # Lowercase imposé par OCI (ghcr.io rejette les majuscules dans le path).
  IMAGE_NAME: ${{ github.repository_owner }}/website

jobs:
  publish:
    name: Build + push GHCR + sign Cosign
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC pour Cosign keyless
      security-events: write
    env:
      TRIVY_DISABLE_VEX_NOTICE: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image owner
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génère 3 types de tags :
      #   - vX.Y.Z (tag sémantique tel quel)
      #   - vX.Y et vX (alias glissants pour suivre les patchs/minors)
      #   - sha-<short> (traçabilité commit, utile pour rollback rapide)
      # Branche develop / main n'est PAS publiée ici (pas de trigger push).
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=OpenLab Consulting Website
            org.opencontainers.image.description=Refonte 2026 — Next.js 15 + Payload v3 sur K3s Hetzner
            org.opencontainers.image.vendor=OpenLab Consulting SARL
            org.opencontainers.image.licenses=UNLICENSED

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true # force pull base images à chaque run (anti-CVE drift)
          platforms: linux/amd64
          # Clé SITE Turnstile = publique par conception (exposée dans le HTML
          # data-sitekey). Inlinée au build car NEXT_PUBLIC_* (client). Le
          # secret correspondant (TURNSTILE_SECRET_KEY) reste côté serveur via
          # le Secret K8s (OWASP A02/A05). Définir la variable Actions
          # `NEXT_PUBLIC_TURNSTILE_SITE_KEY` (Settings → Variables, pas Secrets).
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # Re-scan l'image publiée (par digest, pas par tag — anti-TOCTOU).
      # SARIF d'abord (exit 0) pour audit Code Scanning, puis bloquant.
      - name: Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-release.sarif
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-release.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-release.sarif
          category: trivy-release

      - name: Trivy image scan (BLOQUANT — HIGH+CRITICAL avec fix)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: table
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      # Signature Cosign keyless (OIDC GitHub → Sigstore Rekor public).
      # Permet à `deploy.sh` ou ArgoCD de vérifier que l'image a bien été
      # produite par CE workflow sur CE repo, sans clé privée à stocker.
      # Vérification :
      #   cosign verify ghcr.io/<owner>/website:vX.Y.Z \
      #     --certificate-identity-regexp='https://github.com/${{ github.repository }}/.github/workflows/release.yml@.*' \
      #     --certificate-oidc-issuer=https://token.actions.githubusercontent.com
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}

      - name: Output release summary
        run: |
          {
            echo "## Image publiée"
            echo ""
            echo "- **Repository** : \`ghcr.io/${{ steps.img.outputs.name }}\`"
            echo "- **Digest** : \`${{ steps.build.outputs.digest }}\`"
            echo "- **Tags** :"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/  - `/' | sed 's/$/`/'
            echo ""
            echo "## Déploiement"
            echo ""
            echo '```bash'
            echo "bash deploy/scripts/deploy.sh production <tag>"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────
  # CD — déploiement automatique sur le cluster K3s Hetzner via SSH.
  # Ne tourne que sur un tag de release `vX.Y.Z` (pas les pré-releases
  # -rc ni le dispatch sans tag), et seulement si l'image est publiée.
  #
  # Accès : SSH (clé dédiée en secret) → lance deploy.sh côté serveur.
  # N'expose PAS l'API K8s sur Internet (OWASP A05). Le smoke test est
  # sauté (SKIP_SMOKE=1) car le DNS peut ne pas encore pointer ; la santé
  # est garantie par `helm --wait --atomic`.
  #
  # Secrets requis (Settings → Secrets and variables → Actions → Secrets) :
  #   DEPLOY_SSH_HOST  — IP/host du serveur (ex. 62.238.11.20)
  #   DEPLOY_SSH_USER  — utilisateur SSH (ex. root)
  #   DEPLOY_SSH_KEY   — clé privée SSH dédiée (la publique va dans
  #                      ~/.ssh/authorized_keys du serveur)
  #   DEPLOY_SSH_PORT  — optionnel (défaut 22)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to K3s Hetzner (SSH)
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    steps:
      - name: Derive image tag (strip leading v)
        id: tag
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          command_timeout: 12m
          script: |
            set -euo pipefail
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            if [ ! -d "$HOME/openlabconsulting/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/openlabconsulting"
            fi
            cd "$HOME/openlabconsulting"
            git fetch origin --prune --tags
            git checkout main
            git reset --hard origin/main
            SKIP_SMOKE=1 bash deploy/scripts/deploy.sh production "${{ steps.tag.outputs.value }}"

      - name: Deploy summary
        run: |
          {
            echo "## Déploiement K3s"
            echo "- Tag image : \`${{ steps.tag.outputs.value }}\`"
            echo "- Cible : production (namespace openlab)"
            echo "- Smoke test : sauté (SKIP_SMOKE) — basculer le DNS puis vérifier https://openlabconsulting.com/api/health"
          } >> "$GITHUB_STEP_SUMMARY"
