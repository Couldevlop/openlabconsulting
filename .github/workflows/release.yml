# Release workflow — CD continu déclenché par un PUSH sur `main`.
#
# Flux voulu : push/merge sur `main`  →  portes vertes (CI)  →  création
# automatique d'un tag `vX.Y.Z`  →  build + push de l'image GHCR `X.Y.Z`
# →  ArgoCD Image Updater (stratégie semver) déploie sur le cluster.
#
# « une fois ok » = le job `gate` (format/lint/typecheck/test) doit passer
# AVANT que le tag soit créé et l'image construite. Si une porte échoue :
# pas de tag, pas d'image, pas de déploiement.
#
# Tout reste sur le GITHUB_TOKEN : le tag ET l'image sont produits dans CE
# workflow (pas de chaînage tag→workflow, donc aucun PAT à gérer). GitHub
# ne fait que builder/pousser l'image ; le déploiement est tiré par ArgoCD
# (cf. deploy/argocd/). CLAUDE.md §14.6/§14.7.
name: release

on:
  push:
    branches:
      - main
  # Permet une release manuelle (version explicite ou bump patch auto).
  workflow_dispatch:
    inputs:
      version:
        description: 'Version explicite sans v (ex: 1.1.0). Vide = bump patch auto.'
        required: false
        default: ''

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  # `github.repository_owner` = `Couldevlop` (compte user). Lowercase imposé
  # par OCI (ghcr.io rejette les majuscules dans le path).
  IMAGE_NAME: ${{ github.repository_owner }}/website

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # 1. Portes vertes — « une fois ok ». Bloque tout le reste si rouge.
  # ──────────────────────────────────────────────────────────────────────
  gate:
    name: Portes vertes (format/lint/typecheck/test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  # ──────────────────────────────────────────────────────────────────────
  # 2. Tag de version — créé seulement si les portes sont vertes.
  #    Bump patch auto à partir du dernier tag vX.Y.Z (ou version manuelle).
  # ──────────────────────────────────────────────────────────────────────
  tag:
    name: Créer le tag de version
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # pousser le tag avec le GITHUB_TOKEN
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # besoin de tout l'historique des tags
      - id: bump
        name: Calculer et pousser le tag
        run: |
          set -euo pipefail
          MANUAL="${{ github.event.inputs.version }}"
          if [ -n "$MANUAL" ]; then
            VER="$MANUAL"
          else
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            LATEST=${LATEST:-v0.0.0}
            BASE=${LATEST#v}
            MAJ=${BASE%%.*}; REST=${BASE#*.}; MIN=${REST%%.*}; PAT=${REST##*.}
            PAT=$((PAT + 1))
            VER="${MAJ}.${MIN}.${PAT}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "→ Nouveau tag : v$VER"
          if git rev-parse "v$VER" >/dev/null 2>&1; then
            echo "::error::Le tag v$VER existe déjà." && exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VER" -m "release v$VER (auto — portes vertes sur main)"
          git push origin "v$VER"

  # ──────────────────────────────────────────────────────────────────────
  # 3. Build + push image GHCR + scan Trivy + signature Cosign keyless.
  #    Image taguée `X.Y.Z` (suivie par Image Updater semver) + `sha-<court>`.
  # ──────────────────────────────────────────────────────────────────────
  publish:
    name: Build + push GHCR + sign Cosign
    needs: tag
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC pour Cosign keyless
      security-events: write
    env:
      TRIVY_DISABLE_VEX_NOTICE: 'true'
      VERSION: ${{ needs.tag.outputs.version }}
    steps:
      - name: Checkout (sur le tag créé)
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag.outputs.version }}

      - name: Lowercase image owner
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags produits :
      #   - X.Y.Z      → cible de l'Image Updater (stratégie semver)
      #   - sha-<court> → traçabilité commit / rollback rapide
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=${{ needs.tag.outputs.version }}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=OpenLab Consulting Website
            org.opencontainers.image.description=Refonte 2026 — Next.js 15 + Payload v3 sur K3s Hetzner
            org.opencontainers.image.vendor=OpenLab Consulting SARL
            org.opencontainers.image.licenses=UNLICENSED
            org.opencontainers.image.version=${{ needs.tag.outputs.version }}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true # force pull base images à chaque run (anti-CVE drift)
          platforms: linux/amd64
          # Clé SITE Turnstile = publique par conception (data-sitekey dans le
          # HTML). Inlinée au build car NEXT_PUBLIC_* (client). Le secret
          # correspondant (TURNSTILE_SECRET_KEY) reste côté serveur via le
          # Secret K8s. Définir la variable Actions `NEXT_PUBLIC_TURNSTILE_SITE_KEY`.
          build-args: |
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # Re-scan l'image publiée par digest (anti-TOCTOU). SARIF d'abord
      # (exit 0) pour Code Scanning, puis passe bloquante.
      - name: Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-release.sarif
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-release.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-release.sarif
          category: trivy-release

      - name: Trivy image scan (BLOQUANT — HIGH+CRITICAL avec fix)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: table
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      # Signature Cosign keyless (OIDC GitHub → Sigstore Rekor public).
      # Vérification :
      #   cosign verify ghcr.io/<owner>/website:X.Y.Z \
      #     --certificate-identity-regexp='https://github.com/${{ github.repository }}/.github/workflows/release.yml@.*' \
      #     --certificate-oidc-issuer=https://token.actions.githubusercontent.com
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}

      - name: Output release summary
        run: |
          {
            echo "## Image publiée — v${VERSION}"
            echo ""
            echo "- **Repository** : \`ghcr.io/${{ steps.img.outputs.name }}\`"
            echo "- **Digest** : \`${{ steps.build.outputs.digest }}\`"
            echo "- **Tags** :"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/  - `/' | sed 's/$/`/'
            echo ""
            echo "## Déploiement (GitOps — ArgoCD)"
            echo ""
            echo "Aucune action : ArgoCD Image Updater (semver) détecte le tag"
            echo "\`${VERSION}\` et synchronise le cluster (cf. deploy/argocd/)."
          } >> "$GITHUB_STEP_SUMMARY"
