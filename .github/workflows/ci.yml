name: CI

# Stratégie déclencheurs (anti double-run) :
#
# - `pull_request` UNIQUEMENT : la CI (lint/typecheck/test/build + Trivy)
#   sert de PORTE avant merge. Elle tourne une seule fois sur le code de la
#   PR (feat/fix/chore → develop, ou develop → main).
# - On N'écoute PLUS `push` sur main/develop : le merge d'une PR ne relance
#   donc plus la CI une 2ᵉ fois. L'état post-merge reste couvert :
#     · `develop` → `quality.yml` (push develop : Playwright + Lighthouse) ;
#     · `main`    → `release.yml` (push main : gate lint/test/build + Trivy
#       + Cosign + build/déploiement). La CI sur push:main était donc
#       entièrement redondante avec release.yml.
# - `workflow_dispatch` reste pour un re-run manuel ad hoc.
#
# Cf. https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request
on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

# `head_ref || ref` unifie la clé pour push branche et pull_request
# de cette même branche. Si on garde un jour `on.push` sur feat/**,
# ça empêche les 2 runs concurrents (la plus récente cancel l'autre).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  # NB : version pnpm pilotée par `packageManager` dans package.json
  # (pnpm/action-setup la lit automatiquement). Spécifier `version:` ici
  # déclenche ERR_PNPM_BAD_PM_VERSION.
  # GitHub Actions force Node 24 pour les actions JS à partir du 2 juin 2026.
  # On opt-in maintenant pour faire taire le warning de dépréciation Node 20.
  # Sans impact sur NODE_VERSION (qui contrôle la version Node de NOS scripts).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        # Version lue depuis package.json `packageManager` — ne PAS spécifier
        # `version:` ici sinon pnpm/action-setup throw ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 7

      - name: Build (production)
        run: pnpm build

  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    permissions:
      contents: read
      security-events: write
    env:
      TRIVY_DISABLE_VEX_NOTICE: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load to local daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          pull: true # force pull des base images (Chainguard runner, node:22-alpine builder) à chaque run
          tags: openlab-website:ci
          # Cache GHA des LAYERS de l'app (deps, build) — invalidé naturellement
          # quand le package-lock change. NE cache PAS les base images grâce à pull:true.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      # Tolérant aux race conditions : si la branche source est supprimée
      # (merge + delete) pendant que la run tourne encore, l'API GitHub
      # renvoie "ref not found". On laisse l'upload échouer en silence
      # plutôt que de marquer la run rouge — la prochaine run sur main/
      # develop ré-uploadera le SARIF.
      # CodeQL Action v3 sera déprécié en décembre 2026 — migrer vers v4
      # quand la version sera publiquement disponible.
      - name: Upload Trivy fs SARIF
        if: hashFiles('trivy-fs.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # ----------------------------------------------------------------
      # Politique image scan — sécurité maximale.
      #
      # SARIF d'abord (exit 0) pour TOUJOURS uploader vers Code Scanning,
      # puis re-scan en mode tableau bloquant HIGH+CRITICAL.
      # Toute CVE patchable doit être patchée (dep bump ou pnpm override).
      # Voir docs/security-overrides.md.
      # ----------------------------------------------------------------
      - name: Trivy image scan (SARIF pour Code Scanning)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: openlab-website:ci
          format: sarif
          output: trivy-image.sarif
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy image SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Trivy image scan (BLOQUANT — HIGH+CRITICAL avec fix)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: openlab-website:ci
          format: table
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
