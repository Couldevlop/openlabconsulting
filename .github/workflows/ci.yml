name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 7

      - name: Build (production)
        run: pnpm build

  trivy:
    name: Trivy image scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    permissions:
      contents: read
      security-events: write
    env:
      TRIVY_DISABLE_VEX_NOTICE: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load to local daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          pull: true # force pull des base images (Chainguard runner, node:22-alpine builder) à chaque run
          tags: openlab-website:ci
          # Cache GHA des LAYERS de l'app (deps, build) — invalidé naturellement
          # quand le package-lock change. NE cache PAS les base images grâce à pull:true.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy fs SARIF
        if: hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # ----------------------------------------------------------------
      # Politique image scan — sécurité maximale.
      #
      # SARIF d'abord (exit 0) pour TOUJOURS uploader vers Code Scanning,
      # puis re-scan en mode tableau bloquant HIGH+CRITICAL.
      # Toute CVE patchable doit être patchée (dep bump ou pnpm override).
      # Voir docs/security-overrides.md.
      # ----------------------------------------------------------------
      - name: Trivy image scan (SARIF pour Code Scanning)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: openlab-website:ci
          format: sarif
          output: trivy-image.sarif
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy image SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Trivy image scan (BLOQUANT — HIGH+CRITICAL avec fix)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: openlab-website:ci
          format: table
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
