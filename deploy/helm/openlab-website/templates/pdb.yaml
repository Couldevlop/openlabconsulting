{{- if .Values.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "openlab-website.fullname" . }}
  labels:
    {{- include "openlab-website.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "openlab-website.selectorLabels" . | nindent 6 }}
{{- end -}}
