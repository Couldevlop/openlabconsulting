{{- if .Values.migrate.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "openlab-website.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "openlab-website.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    # Hook Helm. Migrations Payload idempotentes, Job nettoyé après succès.
    # post-install/post-upgrade UNIQUEMENT : le Job doit tourner APRÈS le
    # wave principal (sinon Postgres — sous-chart — n'existe pas encore et
    # l'init-container wait-postgres boucle jusqu'au deadline).
    # ⚠️ ArgoCD traduit les hooks Helm : `pre-*` → PreSync (tourne AVANT les
    # ressources → deadlock observé). On reste donc en post-* = PostSync, et
    # on déclare explicitement le hook ArgoCD pour lever toute ambiguïté.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: '0'
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        {{- include "openlab-website.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "openlab-website.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres.{{ .Release.Namespace }}.svc.cluster.local 5432; do
                sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
      containers:
        - name: migrate
          image: '{{ .Values.image.repository }}:{{ .Values.image.tag }}'
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['/bin/sh', '-c']
          args:
            - |
              set -euo pipefail
              node node_modules/payload/bin.js migrate
          envFrom:
            - configMapRef:
                name: {{ include "openlab-website.fullname" . }}-config
            - secretRef:
                name: {{ .Values.secretRef.name }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end -}}
