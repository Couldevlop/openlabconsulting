# Production — domaine apex + replicas 2 + ressources standards.
# Aligné sur les valeurs par défaut de values.yaml mais explicité ici
# pour traçabilité et override clair.

replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

ingress:
  hosts:
    - host: openlabconsulting.com
      paths:
        - path: /
          pathType: Prefix
    - host: www.openlabconsulting.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: openlab-tls
      hosts:
        - openlabconsulting.com
        - www.openlabconsulting.com

config:
  NEXT_PUBLIC_SITE_URL: 'https://openlabconsulting.com'
  PAYLOAD_PUBLIC_SERVER_URL: 'https://openlabconsulting.com'
  BETTER_AUTH_URL: 'https://openlabconsulting.com'
  OPENLAB_TIER: 'production'
  ZEPTOMAIL_API_URL: 'https://api.zeptomail.eu/v1.1/email'
  EMAIL_FROM: 'noreply@openlabconsulting.com'
  EMAIL_FROM_NAME: 'OpenLab Consulting'
  EMAIL_TEAM: 'waopron@openlabconsulting.com'
  # 2FA admin (OWASP A07). 'false' par défaut — passer à 'true' UNIQUEMENT
  # après avoir configuré son TOTP via /admin-2fa et testé (sinon lockout).
  ENFORCE_ADMIN_2FA: 'false'

# Job de migration Payload désactivé : l'image runner est distroless (pas de
# /bin/sh) et le standalone Next n'embarque pas le CLI payload + migrations/,
# donc le hook échoue et bloque la synchro ArgoCD. Les migrations sont
# appliquées manuellement via tunnel (cf. deploy/argocd/README.md) jusqu'à un
# fix Dockerfile dédié. NE PAS réactiver sans une image capable de migrer.
migrate:
  enabled: false
