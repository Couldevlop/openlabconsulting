# SealedSecret — CLAUDE.md §14.8 + §10.2.
#
# **Stratégie** : on commit ce fichier après l'avoir scellé avec
# `kubeseal` (Bitnami SealedSecrets controller). Le controller du
# cluster K3s le déchiffre en `Secret` natif à l'apply.
#
# **Procédure** pour mettre à jour les secrets :
#   1. Préparer un Secret en clair en local (NE PAS le commit) :
#        kubectl -n openlab create secret generic openlab-website-secrets \
#          --from-literal=DATABASE_URL=postgresql://... \
#          --from-literal=PAYLOAD_SECRET=$(openssl rand -hex 32) \
#          --from-literal=BETTER_AUTH_SECRET=$(openssl rand -hex 32) \
#          --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#          --from-literal=RESEND_API_KEY=re_... \
#          --from-literal=MINIO_ACCESS_KEY=$(openssl rand -hex 16) \
#          --from-literal=MINIO_SECRET_KEY=$(openssl rand -hex 32) \
#          --from-literal=MEILISEARCH_MASTER_KEY=$(openssl rand -hex 32) \
#          --from-literal=TURNSTILE_SECRET_KEY=... \
#          --from-literal=METRICS_TOKEN=$(openssl rand -hex 32) \
#          --dry-run=client -o yaml > /tmp/secret-cleartext.yaml
#
#   2. Sceller avec la clé publique du cluster :
#        kubeseal --controller-namespace=sealed-secrets-system \
#                 --controller-name=sealed-secrets \
#                 --format=yaml < /tmp/secret-cleartext.yaml \
#                 > deploy/k8s/base/secret.sealedsecret.yaml
#
#   3. Supprimer /tmp/secret-cleartext.yaml (`shred -u`).
#
#   4. `git add deploy/k8s/base/secret.sealedsecret.yaml && git commit`.
#
# Le fichier ci-dessous est un placeholder structuré — il NE
# fonctionnera PAS tel quel. À régénérer avec kubeseal avant le premier
# déploiement.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: openlab-website-secrets
  namespace: openlab
spec:
  encryptedData:
    # placeholder — à remplacer par les valeurs scellées via kubeseal.
    DATABASE_URL: 'AgB...placeholder...'
    PAYLOAD_SECRET: 'AgB...placeholder...'
    BETTER_AUTH_SECRET: 'AgB...placeholder...'
    ANTHROPIC_API_KEY: 'AgB...placeholder...'
    RESEND_API_KEY: 'AgB...placeholder...'
    MINIO_ACCESS_KEY: 'AgB...placeholder...'
    MINIO_SECRET_KEY: 'AgB...placeholder...'
    MEILISEARCH_MASTER_KEY: 'AgB...placeholder...'
    TURNSTILE_SECRET_KEY: 'AgB...placeholder...'
    METRICS_TOKEN: 'AgB...placeholder...'
  template:
    metadata:
      name: openlab-website-secrets
      namespace: openlab
    type: Opaque
