apiVersion: apps/v1
kind: Deployment
metadata:
  name: openlab-website
  namespace: openlab
  labels:
    app.kubernetes.io/name: openlab-website
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: openlab-website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openlab-website
        app.kubernetes.io/component: web
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/path: '/api/metrics'
        prometheus.io/port: '3000'
    spec:
      serviceAccountName: openlab-website
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # Image multi-stage Chainguard Node (§13). Tag remplacé par
          # `kubectl set image` ou ArgoCD lors du déploiement.
          image: ghcr.io/openlab-consulting/website:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: openlab-website-config
            - secretRef:
                name: openlab-website-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            failureThreshold: 24 # 24 * 5s = 2 min max au boot
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: nextjs-cache
          emptyDir:
            sizeLimit: 512Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openlab-website
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openlab-website
  namespace: openlab
  labels:
    app.kubernetes.io/name: openlab-website
automountServiceAccountToken: false
