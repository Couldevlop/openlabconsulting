apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: openlab-website
  namespace: openlab
  labels:
    app.kubernetes.io/name: openlab-website
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: openlab-website
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openlab-website
  namespace: openlab
  labels:
    app.kubernetes.io/name: openlab-website
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openlab-website
