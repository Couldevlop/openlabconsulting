# Job de migration Payload — exécuté avant chaque rollout (CLAUDE.md §14.5).
apiVersion: batch/v1
kind: Job
metadata:
  name: openlab-migrate
  namespace: openlab
  labels:
    app.kubernetes.io/name: openlab-migrate
    app.kubernetes.io/component: migration
  annotations:
    # Helm hook : pré-rollout. Pour kubectl apply manuel, le script
    # deploy.sh supprime puis recrée le job pour le rejouer.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openlab-migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: openlab-website
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "[migrate] waiting for postgres..."
              until nc -z postgres.openlab.svc.cluster.local 5432; do
                sleep 2
              done
              echo "[migrate] postgres ready"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
      containers:
        - name: migrate
          image: ghcr.io/openlab-consulting/website:latest
          imagePullPolicy: IfNotPresent
          # `payload migrate` lit DATABASE_URL + PAYLOAD_SECRET et joue
          # toutes les migrations en attente. Idempotent.
          command: ['/bin/sh', '-c']
          args:
            - |
              set -euo pipefail
              echo "[migrate] start $(date -u +%FT%TZ)"
              node node_modules/payload/bin.js migrate
              echo "[migrate] ok $(date -u +%FT%TZ)"
          envFrom:
            - configMapRef:
                name: openlab-website-config
            - secretRef:
                name: openlab-website-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
