apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  namespace: openlab
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/component: search
spec:
  serviceName: meilisearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meilisearch
        app.kubernetes.io/component: search
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.13
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7700
          env:
            - name: MEILI_ENV
              value: 'production'
            - name: MEILI_NO_ANALYTICS
              value: 'true'
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: openlab-website-secrets
                  key: MEILISEARCH_MASTER_KEY
            - name: MEILI_DB_PATH
              value: /meili_data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: meili-data
              mountPath: /meili_data
  volumeClaimTemplates:
    - metadata:
        name: meili-data
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: meilisearch
  namespace: openlab
  labels:
    app.kubernetes.io/name: meilisearch
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: meilisearch
  ports:
    - name: http
      port: 7700
      targetPort: http
